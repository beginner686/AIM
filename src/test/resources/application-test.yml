spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ailink_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: 12345678901234567890123456789012
  expire-seconds: 604800
  token-prefix: Bearer
  header-name: Authorization

wechat:
  pay:
    enabled: false
    mock-auto-success: false
